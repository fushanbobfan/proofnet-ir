name = "proofnet-ir"
version = "0.6.0"
defaultTargets = ["ProofNetIR", "proofnet_ir_tests"]

[[lean_lib]]
name = "ProofNetIR"

[[lean_exe]]
name = "proofnet_ir_tests"
root = "ProofNetIRTests"

[[lean_exe]]
name = "proofnet_ir_audit_graph"
root = "ProofNetIRAuditGraph"

[[lean_exe]]
name = "proofnet_ir_audit_certificates"
root = "ProofNetIRAuditCertificates"

[[lean_exe]]
name = "proofnet_ir_dataset"
root = "ProofNetIRDataset"

[[lean_exe]]
name = "proofnet_ir_parser_fuzz"
root = "ProofNetIRParserFuzz"

[[lean_exe]]
name = "proofnet_ir_benchmark"
root = "ProofNetIRBenchmark"

[[lean_exe]]
name = "proofnet_ir_api_docs"
root = "ProofNetIRAPIDocs"
supportInterpreter = true

[[lean_exe]]
name = "proofnet_ir_experiment_corpus"
root = "ProofNetIRExperimentCorpus"

[[lean_exe]]
name = "proofnet_ir_experiment_verify"
root = "ProofNetIRExperimentVerify"

[[lean_exe]]
name = "proofnet_ir_model_experiment_corpus"
root = "ProofNetIRModelExperimentCorpus"

[[lean_exe]]
name = "proofnet_ir_leanprop_corpus"
root = "ProofNetIRLeanPropCorpus"

[[lean_exe]]
name = "proofnet_ir_leanprop_parser_fuzz"
root = "ProofNetIRLeanPropParserFuzz"

[[lean_exe]]
name = "proofnet_ir_leanprop_corpus_export"
root = "ProofNetIRLeanPropCorpusExport"
