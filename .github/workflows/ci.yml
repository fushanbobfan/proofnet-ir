name: Lean CI

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      release_ref:
        description: Optional branch or tag whose exact contents should be tested
        required: false
        type: string

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.release_ref || github.ref }}
      - name: Verify requested release revision
        if: ${{ inputs.release_ref != '' }}
        env:
          REQUESTED_RELEASE_REF: ${{ inputs.release_ref }}
        run: |
          test "$(git rev-parse HEAD)" = "$(git rev-parse "${REQUESTED_RELEASE_REF}^{commit}")"
          git rev-parse HEAD
      - name: Install Elan
        run: curl https://elan.lean-lang.org/elan-init.sh -sSf | sh -s -- -y --default-toolchain none
      - name: Build and check compile-time fixtures
        run: ~/.elan/bin/lake build
      - name: Run smoke test
        run: ~/.elan/bin/lake exe proofnet_ir_tests
      - name: Validate generated LeanProp template corpus
        run: ~/.elan/bin/lake exe proofnet_ir_leanprop_corpus
      - name: Verify Lean-emitted LeanProp corpus manifest
        run: python scripts/generate_leanprop_manifest.py --check
      - name: Fuzz malformed LeanProp schema inputs
        run: python scripts/fuzz_leanprop_parser.py
      - name: Audit theorem trust dependencies
        run: python scripts/audit_axioms.py
      - name: Verify generated public API reference
        run: ~/.elan/bin/lake exe proofnet_ir_api_docs --check
      - name: Fuzz malformed parser inputs
        run: python scripts/fuzz_malformed_parser.py
      - name: Enforce representative runtime budget
        run: ~/.elan/bin/lake exe proofnet_ir_benchmark
      - name: Audit checker-free reconstruction against the reference checker
        run: ~/.elan/bin/lake exe proofnet_ir_reconstruction_audit
      - name: Stress checker-free reconstruction shapes and repeated labels
        run: ~/.elan/bin/lake exe proofnet_ir_reconstruction_stress
      - name: Build as a downstream Lake dependency
        working-directory: consumer-smoke
        run: ~/.elan/bin/lake build && ~/.elan/bin/lake exe proofnet_ir_consumer_smoke
      - name: Consume the pinned public v0.8.0 release
        working-directory: consumer-v08-candidate-smoke
        run: ~/.elan/bin/lake build && ~/.elan/bin/lake exe proofnet_ir_v08_release_consumer_smoke
      - name: Consume the pinned public v0.7.0 release
        working-directory: consumer-v07-candidate-smoke
        run: ~/.elan/bin/lake build && ~/.elan/bin/lake exe proofnet_ir_v07_release_consumer_smoke
      - name: Consume the pinned public v0.6.0 release
        working-directory: consumer-v06-candidate-smoke
        run: ~/.elan/bin/lake build && ~/.elan/bin/lake exe proofnet_ir_v06_candidate_consumer_smoke
      - name: Consume the pinned public v0.5.0 release
        working-directory: consumer-release-smoke
        run: ~/.elan/bin/lake build && ~/.elan/bin/lake exe proofnet_ir_release_consumer_smoke
      - name: Validate JSON certificate contract
        run: |
          python -m pip install --disable-pip-version-check jsonschema==4.26.0
          python scripts/validate_schema.py
      - name: Verify deterministic v0.2 dataset
        run: python scripts/generate_dataset.py --check
      - name: Audit v0.3 reindex-invariant canonical keys
        run: python scripts/audit_v03_canonical.py
      - name: Run focused cut-free search baseline
        run: python scripts/focused_search.py examples/focused-sequent-v0.2.json --require-found
      - name: Validate committed matched-experiment artifacts
        run: python scripts/run_matched_experiment.py --check-committed
      - name: Validate model-experiment preregistration
        run: |
          python scripts/run_model_experiment.py --check-preregistered
          python scripts/run_model_experiment_amended.py --check-amendment
          python scripts/run_model_experiment_amended.py --smoke
          python scripts/run_model_experiment_amended.py --check-committed
      - name: Smoke matched generation, repair, and Lean verification
        run: python scripts/run_matched_experiment.py --limit 8
      - name: Run independent differential mathematics audit
        run: python scripts/audit_v010.py
