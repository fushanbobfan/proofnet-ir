name: Lean CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Elan
        run: curl https://elan.lean-lang.org/elan-init.sh -sSf | sh -s -- -y --default-toolchain none
      - name: Build and check compile-time fixtures
        run: ~/.elan/bin/lake build
      - name: Run smoke test
        run: ~/.elan/bin/lake exe proofnet_ir_tests
      - name: Audit theorem trust dependencies
        run: python scripts/audit_axioms.py
      - name: Verify generated public API reference
        run: ~/.elan/bin/lake exe proofnet_ir_api_docs --check
      - name: Fuzz malformed parser inputs
        run: python scripts/fuzz_malformed_parser.py
      - name: Enforce representative runtime budget
        run: ~/.elan/bin/lake exe proofnet_ir_benchmark
      - name: Build as a downstream Lake dependency
        working-directory: consumer-smoke
        run: ~/.elan/bin/lake build && ~/.elan/bin/lake exe proofnet_ir_consumer_smoke
      - name: Consume the pinned public v0.4.0 release
        working-directory: consumer-release-smoke
        run: ~/.elan/bin/lake build && ~/.elan/bin/lake exe proofnet_ir_release_consumer_smoke
      - name: Validate JSON certificate contract
        run: |
          python -m pip install --disable-pip-version-check jsonschema==4.26.0
          python scripts/validate_schema.py
      - name: Verify deterministic v0.2 dataset
        run: python scripts/generate_dataset.py --check
      - name: Audit v0.3 reindex-invariant canonical keys
        run: python scripts/audit_v03_canonical.py
      - name: Run focused cut-free search baseline
        run: python scripts/focused_search.py examples/focused-sequent-v0.2.json --require-found
      - name: Validate committed matched-experiment artifacts
        run: python scripts/run_matched_experiment.py --check-committed
      - name: Smoke matched generation, repair, and Lean verification
        run: python scripts/run_matched_experiment.py --limit 8
      - name: Run independent differential mathematics audit
        run: python scripts/audit_v010.py
